<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UREC Classes</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f9f9f9;
            padding: 2rem;
        }
        h1 {
            color: #4b2e83;
        }
        .class-card {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .deadline {
            color: #c0392b;
        }
        .class-date {
            font-style: italic;
            color: #666;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <h1>Available UREC Classes</h1>

    {% for c in classes %}
        <div class="class-card">
            <div class="class-date">{{ c.date|date:"l, F j, Y" }}</div>
            <strong>{{ c.name }}</strong><br>
            {{ c.time }} | {{ c.location }}<br>
            <span class="deadline">Register by: {{ c.registration_deadline|date:"F j, Y, g:i a" }}</span>
        </div>
    {% empty %}
        <p>No classes available right now.</p>
    {% endfor %}
</body>
</html>
